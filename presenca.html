<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirmação de Presença</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --green:#2f5f52;
      --line:#dedad3;
      --text:#2c2c2c;
      --muted:#777;
      --shadow: 0 12px 32px rgba(0,0,0,.10);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      background:var(--bg);
      font-family:'Inter', sans-serif;
      color:var(--text);
      display:flex;
      justify-content:center;
      align-items:center;
      padding: 18px;
      overflow-x: hidden;
    }

    .wrap{
      width: 100%;
      max-width: 560px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      width: 100%;
      max-width: 520px;
      background:var(--card);
      border-radius:18px;
      padding: 32px 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      text-align: center;
    }

    h1{
      font-family:'Playfair Display', serif;
      text-align:center;
      font-size:28px;
      color:var(--green);
      margin:0 0 8px;
    }

    .subtitle{
      text-align:center;
      font-size:12px;
      letter-spacing:1.4px;
      text-transform:uppercase;
      color:var(--muted);
      margin:0 0 22px;
    }

    .box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px 18px;
      background:#fff;
    }

    .message{
      font-size:15px;
      line-height:1.8;
      margin:0;
    }

    .highlight{
      color:var(--green);
      font-weight:600;
    }

    .buttons{
      display:flex;
      gap:12px;
      margin-top:22px;
      width: 100%;
    }

    .btn{
      flex:1;
      min-width:0;
      padding:14px;
      border-radius:30px;
      font-size:14px;
      cursor:pointer;
      border:none;
      text-decoration:none;
      text-align:center;
      font-weight:600;
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .btn-primary{
      background:var(--green);
      color:#fff;
    }

    @media (max-width: 360px){
      .buttons { flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Confirmação de Presença</h1>
      <div class="subtitle">CONFIRMAÇÕES ENCERRADAS</div>

      <div class="box">
        <p class="message">
          Agradecemos de coração a todos que já confirmaram sua presença.<br><br>
          <span class="highlight">Estamos muito felizes por compartilhar esse momento tão especial com vocês.</span>
        </p>
      </div>

      <div class="buttons">
        <a href="index.html" class="btn btn-secondary">Voltar</a>
        <a href="index.html" class="btn btn-primary">Início</a>
      </div>
    </div>
  </div>
</body>
</html>
