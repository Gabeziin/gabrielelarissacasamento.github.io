<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larissa & Gabriel | Casamento</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e9e5df;
      --shadow: 0 10px 28px rgba(0,0,0,.06);

      --green: #2f5f52;
      --gold: #c9b28c;
      --names: #b4c4cc;
      --and: #beae92;

      --text: #333;
      --muted: #777;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* garante que fique tudo na tela */
    .page{
      min-height: 100svh; /* melhor no iPhone */
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 10px 12px; /* bem compacto */
    }

    .container{
      width: 100%;
      max-width: 420px;

      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);

      padding: 18px 16px; /* reduzido */
      text-align:center;

      display:flex;
      flex-direction:column;
      gap: 10px; /* compacto */
    }

    /* texto topo */
    .intro{
      text-transform: uppercase;
      letter-spacing: 1.6px;
      font-size: 12px;
      line-height: 1.6;
      margin: 0;
    }

    /* nomes */
    .names{
      display:flex;
      flex-direction:column;
      align-items:center;
      font-family: 'Pinyon Script', cursive;
      font-weight: 400;
      line-height: 1.05;
      margin: 0;
    }
    .names .top,
    .names .bottom{
      color: var(--names);
      font-size: 44px; /* levemente menor pra caber */
    }
    .names .and{
      color: var(--and);
      font-size: 20px;
      margin: 2px 0;
      font-family: 'Pinyon Script', cursive;
      font-weight: 400;
    }

    /* data no estilo canva */
    .date{
      display:flex;
      justify-content:center;
      align-items: baseline;
      gap: 10px;
      margin-top: 2px;
    }
    .date .month,
    .date .year{
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
    }
    .date .day{
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .date .divider{
      color: var(--gold);
    }

    /* hora + local */
    .when{
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 13px;
      line-height: 1.35;
      margin: 0;
    }

    /* título contador */
    .countdown-title{
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 2.2px;
      font-size: 12px;
      color: var(--muted);
    }

    /* contador */
    .countdown{
      display:grid;
      grid-template-columns: repeat(3, 1fr); /* 3 caixas */
      gap: 10px;
      margin-top: 4px;
    }
    .cd-item{
      border: 1px solid #e6e1da;
      border-radius: 16px;
      padding: 12px 10px;
      background: #fff;
    }
    .cd-num{
      font-size: 26px;
      font-weight: 700;
      color: #2b5a4f;
      line-height: 1.1;
    }
    .cd-lab{
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* botão */
    .btn{
      display:block;
      margin-top: 6px;
      padding: 14px 16px;
      background: var(--green);
      color:#fff;
      text-decoration:none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
    }

    /* micro ajustes em telas muito pequenas */
    @media (max-height: 700px){
      .container{ padding: 16px 14px; gap: 8px; }
      .names .top, .names .bottom{ font-size: 40px; }
      .date .day{ font-size: 42px; }
      .cd-item{ padding: 10px 8px; }
      .cd-num{ font-size: 24px; }
      .btn{ padding: 12px 14px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">

      <p class="intro">
        É COM IMENSA ALEGRIA QUE<br>
        CONVIDAMOS VOCÊS PARA CELEBRAR<br>
        O NOSSO CASAMENTO
      </p>

      <h1 class="names">
        <span class="top">Larissa</span>
        <span class="and">e</span>
        <span class="bottom">Gabriel</span>
      </h1>

      <div class="date">
        <span class="month">ABRIL</span>
        <span class="divider">|</span>
        <span class="day">25</span>
        <span class="divider">|</span>
        <span class="year">2026</span>
      </div>

      <p class="when">
        ÀS 11H00<br>
        CHÁCARA BARROCA
      </p>

      <div class="countdown-title">CONTAMOS COM A SUA CONFIRMAÇÃO ATÉ</div>

      <div class="countdown" id="countdown">
        <div class="cd-item">
          <div class="cd-num" id="cd-d">00</div>
          <div class="cd-lab">DIAS</div>
        </div>
        <div class="cd-item">
          <div class="cd-num" id="cd-h">00</div>
          <div class="cd-lab">HORAS</div>
        </div>
        <div class="cd-item">
          <div class="cd-num" id="cd-m">00</div>
          <div class="cd-lab">MIN</div>
        </div>
      </div>

      <a href="presenca.html" class="btn">Confirmar presença</a>

    </div>
  </div>

  <script>
  // Contador até 15/03/2026 23:59:59
  // mês 2 = março
  const target = new Date(2026, 3, 5, 23, 59, 59);

  const elD = document.getElementById("cd-d");
  const elH = document.getElementById("cd-h");
  const elM = document.getElementById("cd-m");

  function pad(n){
    return String(n).padStart(2,"0");
  }

  function tick(){
    const now = new Date();
    let diff = target.getTime() - now.getTime();

    if(diff < 0) diff = 0;

    const total = Math.floor(diff / 1000);
    const days = Math.floor(total / 86400);
    const hours = Math.floor((total % 86400) / 3600);
    const minutes = Math.floor((total % 3600) / 60);

    elD.textContent = pad(days);
    elH.textContent = pad(hours);
    elM.textContent = pad(minutes);
  }

  tick();
  setInterval(tick, 30000);
</script>
</body>
</html>
