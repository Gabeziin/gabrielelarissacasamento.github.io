<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Larissa & Gabriel | Casamento</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e9e5df;
      --shadow: 0 10px 28px rgba(0,0,0,.06);

      --green: #2f5f52;
      --gold: #c9b28c;
      --names: #b4c4cc;
      --and: #beae92;

      --text: #333;
      --muted: #777;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page{
      min-height: 100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 16px 12px;
    }

    .container{
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px 18px;
      text-align:center;
      display:flex;
      flex-direction:column;
      gap: 14px;
    }

    .intro{
      text-transform: uppercase;
      letter-spacing: 1.6px;
      font-size: 12px;
      line-height: 1.6;
      margin: 0;
    }

    .names{
      display:flex;
      flex-direction:column;
      align-items:center;
      font-family: 'Pinyon Script', cursive;
      font-weight: 400;
      line-height: 1.05;
      margin: 0;
    }

    .names .top,
    .names .bottom{
      color: var(--names);
      font-size: 44px;
    }

    .names .and{
      color: var(--and);
      font-size: 20px;
      margin: 2px 0;
      font-family: 'Pinyon Script', cursive;
      font-weight: 400;
    }

    .date{
      display:flex;
      justify-content:center;
      align-items: baseline;
      gap: 10px;
      margin-top: 2px;
    }

    .date .month,
    .date .year{
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .date .day{
      font-family: 'Cormorant Garamond', serif;
      font-size: 46px;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }

    .date .divider{
      color: var(--gold);
    }

    .when{
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }

    .message-box{
      margin-top: 8px;
      border: 1px solid #e6e1da;
      border-radius: 16px;
      padding: 18px 16px;
      background: #fff;
    }

    .message-title{
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .message-text{
      font-size: 15px;
      line-height: 1.7;
      margin: 0;
      color: var(--text);
    }

    .thanks{
      color: var(--green);
      font-weight: 700;
    }

    .btn{
      display:block;
      margin-top: 4px;
      padding: 14px 16px;
      background: var(--green);
      color:#fff;
      text-decoration:none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
    }

    @media (max-height: 700px){
      .container{ padding: 20px 16px; gap: 12px; }
      .names .top, .names .bottom{ font-size: 40px; }
      .date .day{ font-size: 42px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">

      <p class="intro">
        É COM IMENSA ALEGRIA QUE<br>
        CELEBRAMOS ESTE MOMENTO TÃO ESPECIAL
      </p>

      <h1 class="names">
        <span class="top">Larissa</span>
        <span class="and">e</span>
        <span class="bottom">Gabriel</span>
      </h1>

      <div class="date">
        <span class="month">ABRIL</span>
        <span class="divider">|</span>
        <span class="day">25</span>
        <span class="divider">|</span>
        <span class="year">2026</span>
      </div>

      <p class="when">
        ÀS 11H00<br>
        CHÁCARA BARROCA
      </p>

      <div class="message-box">
        <div class="message-title">CONFIRMAÇÕES ENCERRADAS</div>
        <p class="message-text">
          Agradecemos com carinho a todos que já confirmaram sua presença.<br><br>
          <span class="thanks">Estamos muito felizes em celebrar esse momento com vocês.</span>
        </p>
      </div>

      <a href="presenca.html" class="btn">Ver mensagem</a>

    </div>
  </div>
</body>
</html>
